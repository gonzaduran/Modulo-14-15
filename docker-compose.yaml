version: '3.8'

services:
  db:
    image: postgres:16
    container_name: db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    # Database port is NOT exposed to the host for security.
    # Other containers on this network can still reach it via hostname "db".
    networks:
      - odoo-net

  odoo:
    image: odoo:17
    container_name: odoo
    depends_on:
      - db
    ports:
      - "8200:8069"
    environment:
      - HOST=db
      - USER=${POSTGRES_USER}
      - PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - odoo-net

  pgadmin:
    image: elestio/pgadmin:REV20
    container_name: pgadmin
    restart: always
    ports:
      - "127.0.0.1:5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    networks:
      - odoo-net

networks:
  odoo-net:
    driver: bridge
